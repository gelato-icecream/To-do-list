<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>To Do Lists</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
            --transition: all 0.3s ease;
            --bg-modal: #1e293b;
            --bg-app-gradient: radial-gradient(circle at top right, #1e293b 0%, var(--bg-dark) 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
            background: var(--bg-app-gradient);
        }

        /* Screens */
        .screen {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding-bottom: 100px;
            animation: fadeIn 0.3s ease-out;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography & Headers */
        header {
            padding: 30px 20px 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .header-with-back {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-left h1 {
            font-size: 22px;
        }

        /* Buttons */
        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
        }

        .icon-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .icon-btn.text-danger:hover {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--accent);
            color: #fff;
            border: none;
            box-shadow: 0 8px 20px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: var(--transition);
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* Card Grid (for lists) */
        main {
            padding: 0 20px;
            flex: 1;
        }

        .card-grid {
            display: grid;
            gap: 15px;
            grid-template-columns: 1fr;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-info p {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Items List (inside a list) */
        .items-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 0.2s ease-out;
            transition: var(--transition);
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .checkbox svg {
            color: #fff;
            width: 16px;
            height: 16px;
            opacity: 0;
            transition: var(--transition);
        }

        .checkbox.checked svg {
            opacity: 1;
        }

        .item-info {
            flex: 1;
            cursor: pointer;
        }

        .item-info h4 {
            font-size: 16px;
            font-weight: 500;
            transition: var(--transition);
            color: var(--text-primary);
        }

        .item.completed .item-info h4 {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-type {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--bg-modal);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .input-group input, .input-group select {
            width: 100%;
            background: rgba(128, 128, 128, 0.1);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group select {
            appearance: none;
            cursor: pointer;
        }

        .input-group select option {
            background: var(--bg-modal);
            color: var(--text-primary);
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-text, .btn-primary {
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-text {
            background: none;
            color: var(--text-secondary);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            display: none;
        }

        .empty-state svg {
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 15px;
            scrollbar-width: none;
        }
        
        .tabs-container::-webkit-scrollbar {
            display: none;
        }
        
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
        }
        
        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        
        .tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Dashboard Screen: Shows all the different lists -->
        <div id="dashboard-screen" class="screen active">
            <header>
                <h1>My Lists</h1>
                <p>Manage your different to-do lists</p>
            </header>

            <main>
                <div id="lists-grid" class="card-grid">
                    <!-- List cards will be rendered here -->
                </div>
                
                <div id="dashboard-empty" class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                    <p>No lists yet. Tap the + button to create one.</p>
                </div>
            </main>

            <button class="fab" onclick="showModal('add-list-modal')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>
        </div>

        <!-- Detail Screen: Shows tasks for a specific list -->
        <div id="list-screen" class="screen">
            <header class="header-with-back">
                <div class="header-left">
                    <button class="icon-btn" onclick="showScreen('dashboard-screen')" style="color: var(--text-primary);">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <div>
                        <h1 id="current-list-title">List Name</h1>
                        <p id="current-list-stats">0 of 0 tasks completed</p>
                    </div>
                </div>
                <div style="display: flex; gap: 5px;">
                    <button class="icon-btn" onclick="openListSettings()" aria-label="List Settings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                    <button class="icon-btn text-danger" onclick="deleteCurrentList()" aria-label="Delete List">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
            </header>

            <main>
                <div id="list-tabs" class="tabs-container" style="display: none;"></div>
                <div id="tasks-list" class="items-list">
                    <!-- Tasks will be rendered here -->
                </div>
                
                <div id="tasks-empty" class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                    <p>No tasks in this list. Tap the + button to add one.</p>
                </div>
            </main>

            <button class="fab" onclick="showModal('add-task-modal')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- List Settings Modal -->
    <div class="modal-overlay" id="list-settings-modal">
        <div class="modal">
            <h2>List Settings</h2>
            
            <div style="margin-bottom: 20px;">
                <h3 style="font-size: 16px; margin-bottom: 10px; color: var(--text-primary);">Manage Tabs</h3>
                <div class="input-group" style="display: flex; gap: 10px;">
                    <input type="text" id="new-tab-input" placeholder="New tab name (e.g. To-do)">
                    <button class="btn-primary" onclick="addTab()">Add</button>
                </div>
                <div id="settings-tabs-list" style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px;">
                    <!-- Existing tabs will be listed here with delete buttons -->
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="btn-primary" onclick="hideModal('list-settings-modal')">Done</button>
            </div>
        </div>
    </div>

    <!-- Add List Modal -->
    <div class="modal-overlay" id="add-list-modal">
        <div class="modal">
            <h2>Create New List</h2>
            <div class="input-group">
                <input type="text" id="list-input" placeholder="e.g. Groceries, Work, Home">
            </div>
            <div class="modal-actions">
                <button class="btn-text" onclick="hideModal('add-list-modal')">Cancel</button>
                <button class="btn-primary" onclick="addList()">Create</button>
            </div>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div class="modal-overlay" id="add-task-modal">
        <div class="modal">
            <h2>Add Task</h2>
            <div class="input-group">
                <input type="text" id="task-input" placeholder="What needs to be done?">
            </div>
            <div class="input-group" style="margin-top: 15px;">
                <input type="text" id="task-desc-input" placeholder="Description (optional)">
            </div>
            <div class="input-group" style="margin-top: 15px;">
                <select id="task-tab-select">
                    <option value="normal">General</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-text" onclick="hideModal('add-task-modal')">Cancel</button>
                <button class="btn-primary" onclick="addTask()">Add</button>
            </div>
        </div>
    </div>

    <script>
        // State
        // Data structure: [{ id: 1, name: "Groceries", tasks: [{text: "Milk", completed: false}] }]
        let lists = JSON.parse(localStorage.getItem('todo_lists_v2'));
        
        // Migration from old version (single list) to new version (multiple lists)
        if (!lists) {
            lists = [];
            const oldTasks = JSON.parse(localStorage.getItem('todo_tasks'));
            if (oldTasks && oldTasks.length > 0) {
                lists.push({
                    id: Date.now(),
                    name: "My Tasks",
                    tasks: oldTasks
                });
            }
        }
        
        let currentListIndex = null;
        let currentTab = "All";

        // DOM Elements
        const listsGrid = document.getElementById('lists-grid');
        const dashboardEmpty = document.getElementById('dashboard-empty');
        const tasksList = document.getElementById('tasks-list');
        const tasksEmpty = document.getElementById('tasks-empty');
        const currentListTitle = document.getElementById('current-list-title');
        const currentListStats = document.getElementById('current-list-stats');
        
        const listInput = document.getElementById('list-input');
        const taskInput = document.getElementById('task-input');

        // Functions
        function saveState() {
            localStorage.setItem('todo_lists_v2', JSON.stringify(lists));
            if (currentListIndex !== null) {
                renderTasks();
            } else {
                renderDashboard();
            }
        }

        // Dashboard Screen Functions
        function renderDashboard() {
            listsGrid.innerHTML = '';
            
            if (lists.length === 0) {
                dashboardEmpty.style.display = 'block';
            } else {
                dashboardEmpty.style.display = 'none';
                
                lists.forEach((list, index) => {
                    const totalTasks = list.tasks.length;
                    const completedTasks = list.tasks.filter(t => t.completed).length;
                    const progressPercentage = totalTasks > 0 ? (completedTasks / totalTasks) * 100 : 0;
                    
                    const cardEl = document.createElement('div');
                    cardEl.className = 'card';
                    cardEl.onclick = () => openList(index);
                    
                    cardEl.innerHTML = `
                        <div style="width: 100%;">
                            <div class="card-info">
                                <h3>${escapeHtml(list.name)}</h3>
                                <p>${completedTasks} of ${totalTasks} completed</p>
                            </div>
                            <div class="progress-bar-container">
                                <div class="progress-bar" style="width: ${progressPercentage}%"></div>
                            </div>
                        </div>
                    `;
                    
                    listsGrid.appendChild(cardEl);
                });
            }
        }

        function addList() {
            const name = listInput.value.trim();
            if (name) {
                lists.push({
                    id: Date.now(),
                    name: name,
                    tasks: []
                });
                saveState();
                hideModal('add-list-modal');
            }
        }

        function openList(index) {
            currentListIndex = index;
            renderTasks();
            showScreen('list-screen');
        }

        function deleteCurrentList() {
            if (currentListIndex !== null) {
                if (confirm('Are you sure you want to delete this entire list?')) {
                    lists.splice(currentListIndex, 1);
                    currentListIndex = null;
                    saveState();
                    showScreen('dashboard-screen');
                }
            }
        }
        
        // Settings Functions
        function openListSettings() {
            if (currentListIndex === null) return;
            const currentList = lists[currentListIndex];
            
            if (!currentList.tabs) {
                currentList.tabs = [];
            }
            
            renderSettingsTabs();
            showModal('list-settings-modal');
        }

        function renderSettingsTabs() {
            if (currentListIndex === null) return;
            const currentList = lists[currentListIndex];
            const container = document.getElementById('settings-tabs-list');
            container.innerHTML = '';
            
            if (!currentList.tabs || currentList.tabs.length === 0) {
                container.innerHTML = '<p style="font-size: 13px; color: var(--text-secondary);">No custom tabs added yet.</p>';
                return;
            }
            
            currentList.tabs.forEach((tab, index) => {
                const el = document.createElement('div');
                el.style.display = 'flex';
                el.style.justifyContent = 'space-between';
                el.style.alignItems = 'center';
                el.style.background = 'rgba(255, 255, 255, 0.05)';
                el.style.padding = '8px 12px';
                el.style.borderRadius = '8px';
                
                el.innerHTML = `
                    <span>${escapeHtml(tab)}</span>
                    <button class="icon-btn" onclick="deleteTab(${index})" style="padding: 4px; color: var(--danger);">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                `;
                container.appendChild(el);
            });
        }

        function addTab() {
            if (currentListIndex === null) return;
            const input = document.getElementById('new-tab-input');
            const name = input.value.trim();
            if (name) {
                const currentList = lists[currentListIndex];
                if (!currentList.tabs) currentList.tabs = [];
                if (!currentList.tabs.includes(name)) {
                    currentList.tabs.push(name);
                    saveState();
                    renderSettingsTabs();
                }
                input.value = '';
            }
        }

        function deleteTab(index) {
            if (currentListIndex === null) return;
            const currentList = lists[currentListIndex];
            if (currentList.tabs && currentList.tabs.length > index) {
                currentList.tabs.splice(index, 1);
                saveState();
                renderSettingsTabs();
            }
        }

        // List Screen Functions
        function renderTasks() {
            if (currentListIndex === null) return;
            
            const currentList = lists[currentListIndex];
            currentListTitle.textContent = currentList.name;
            
            const totalTasks = currentList.tasks.length;
            const completedTasks = currentList.tasks.filter(t => t.completed).length;
            currentListStats.textContent = `${completedTasks} of ${totalTasks} tasks completed`;
            
            // Get unique types for tabs
            const types = ["All"];
            
            if (currentList.tabs) {
                currentList.tabs.forEach(t => {
                    if (!types.includes(t)) types.push(t);
                });
            }
            
            // Auto-migrate any existing types into explicit tabs so they aren't lost
            currentList.tasks.forEach(task => {
                const t = task.type || "normal";
                if (t !== "normal" && !types.includes(t)) {
                    types.push(t);
                    if (!currentList.tabs) currentList.tabs = [];
                    currentList.tabs.push(t);
                }
            });
            
            if (!types.includes(currentTab)) {
                currentTab = "All";
            }
            
            // Render tabs
            const tabsContainer = document.getElementById('list-tabs');
            if (tabsContainer) {
                tabsContainer.innerHTML = '';
                if (types.length > 2 || (types.length === 2 && types[1] !== "normal")) {
                    tabsContainer.style.display = 'flex';
                    types.forEach(type => {
                        const tabEl = document.createElement('button');
                        tabEl.className = `tab ${currentTab === type ? 'active' : ''}`;
                        tabEl.textContent = type === "normal" ? "General" : type;
                        tabEl.onclick = () => {
                            currentTab = type;
                            renderTasks();
                        };
                        tabsContainer.appendChild(tabEl);
                    });
                } else {
                    tabsContainer.style.display = 'none';
                }
            }
            
            tasksList.innerHTML = '';
            
            const filteredTasks = currentTab === "All" 
                ? currentList.tasks 
                : currentList.tasks.filter(t => (t.type || "normal") === currentTab);
            
            if (filteredTasks.length === 0) {
                tasksEmpty.style.display = 'block';
                if (currentTab !== "All") {
                    tasksEmpty.querySelector('p').textContent = `No tasks in ${currentTab}.`;
                } else {
                    tasksEmpty.querySelector('p').textContent = 'No tasks in this list. Tap the + button to add one.';
                }
            } else {
                tasksEmpty.style.display = 'none';
                
                filteredTasks.forEach(task => {
                    const index = currentList.tasks.indexOf(task);
                    const itemEl = document.createElement('div');
                    itemEl.className = `item ${task.completed ? 'completed' : ''}`;
                    
                    itemEl.innerHTML = `
                        <div class="item-left" onclick="toggleTask(${index})">
                            <div class="checkbox ${task.completed ? 'checked' : ''}">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                    <polyline points="20 6 9 17 4 12"></polyline>
                                </svg>
                            </div>
                            <div class="item-info">
                                <h4>${escapeHtml(task.text)}</h4>
                                ${task.desc ? `<p style="font-size: 13px; color: var(--text-secondary); margin-top: 2px;">${escapeHtml(task.desc)}</p>` : ''}
                                ${task.type && task.type.toLowerCase() !== 'normal' && currentTab === "All" ? `<span class="task-type">${escapeHtml(task.type)}</span>` : ''}
                            </div>
                        </div>
                        <button class="icon-btn" onclick="deleteTask(${index})" aria-label="Delete">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                            </svg>
                        </button>
                    `;
                    
                    tasksList.appendChild(itemEl);
                });
            }
        }

        function addTask() {
            if (currentListIndex === null) return;
            
            let text = taskInput.value.trim();
            const descInput = document.getElementById('task-desc-input');
            const desc = descInput ? descInput.value.trim() : '';
            
            const tabSelect = document.getElementById('task-tab-select');
            let type = tabSelect ? tabSelect.value : "normal";

            if (text) {
                lists[currentListIndex].tasks.push({ text: text, desc: desc, completed: false, type: type });
                if (currentTab !== "All" && type !== currentTab) {
                    currentTab = "All"; // Switch to All to show the new item if type doesn't match tab
                }
                saveState();
                hideModal('add-task-modal');
            }
        }

        function toggleTask(index) {
            if (currentListIndex === null) return;
            const task = lists[currentListIndex].tasks[index];
            task.completed = !task.completed;
            saveState();
        }

        function deleteTask(index) {
            if (currentListIndex === null) return;
            lists[currentListIndex].tasks.splice(index, 1);
            saveState();
        }

        // UI Functions
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'dashboard-screen') {
                currentListIndex = null;
                renderDashboard();
            }
        }

        function showModal(modalId) {
            const modal = document.getElementById(modalId);
            const inputs = modal.querySelectorAll('input');
            inputs.forEach(input => input.value = '');
            
            if (modalId === 'add-task-modal') {
                const select = document.getElementById('task-tab-select');
                if (select && currentListIndex !== null) {
                    select.innerHTML = '<option value="normal">General</option>';
                    const currentList = lists[currentListIndex];
                    if (currentList.tabs) {
                        currentList.tabs.forEach(tab => {
                            select.innerHTML += `<option value="${escapeHtml(tab)}">${escapeHtml(tab)}</option>`;
                        });
                    }
                    if (currentTab !== 'All' && currentTab !== 'normal') {
                        select.value = currentTab;
                    } else {
                        select.value = 'normal';
                    }
                }
            }
            
            const firstInput = inputs.length > 0 ? inputs[0] : null;
            
            modal.style.display = 'flex';
            // Slight delay to allow display:flex to apply before adding active class for transition
            setTimeout(() => {
                modal.classList.add('active');
                if (firstInput) firstInput.focus();
            }, 10);
        }

        function hideModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        // Utility
        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        // Event Listeners
        listInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addList();
        });

        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });
        
        const newTabInput = document.getElementById('new-tab-input');
        if (newTabInput) {
            newTabInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addTab();
            });
        }

        // Close modals when clicking outside
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    hideModal(modal.id);
                }
            });
        });

        // Initial render
        renderDashboard();
    </script>
</body>
</html>
